# Cosmetic status line for the demo recordings -- a stock tmux status bar
# reads as someone who hasn't touched their config, which undercuts a
# picker aimed at people who already customize their terminal. Mirrors the
# shape (not the exact bindings) of Jeff's real ~/.tmux.conf: an accented
# bar, "#S >>> " session label, bracketed window list. Accent color is
# Tomorrow Night's blue, matching `Set Theme "Tomorrow Night"` in the tapes.
set -g status-style "bg=#81a2be,fg=black"
set -g status-left-length 30
set -g status-left "#[fg=black,bg=#81a2be,bold] #S >>> #[default] "
set -g window-status-format " [#I] #W "
set -g window-status-current-format "#[fg=#81a2be,bg=black,bold] [#I] #W #[default]"
set -g window-status-separator "|"

bind s display-popup -E -B -w 84 -h 60% "exec rolomux"
